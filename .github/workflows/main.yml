name: Sync to Hugging Face hub
on:
  push:
    branches: [main]

  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Debug
        env: 
          HF: ${{ secrets.HF }}
        run: echo "$HF"
      - name: Add remote
        env:
          HF: ${{ secrets.HF }}
        run: git remote add space https://huggingface.co/spaces/braisreal/demo
      - name: Push to hub
        env:
          HF: ${{ secrets.HF }}
        run: git push https://braisreal:$HF@huggingface.co/spaces/braisreal/demo main
